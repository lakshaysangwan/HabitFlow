name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create test environment vars
        run: |
          echo "JWT_SECRET=vitest-test-secret-minimum-32-chars-ok" >> .dev.vars
          echo "ENVIRONMENT=preview" >> .dev.vars
          echo "ALLOWED_ORIGIN=http://localhost:5173" >> .dev.vars

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
