name = "habitflow"
compatibility_date = "2024-09-23"
pages_build_output_dir = "./dist"

[[d1_databases]]
binding = "DB"
database_name = "habitflow-db"
database_id = "bdab1915-ced9-4c8c-9d75-5c0a69310ac2"
migrations_dir = "drizzle/migrations"

[vars]
ENVIRONMENT = "production"
ALLOWED_ORIGIN = "https://habitflow.pages.dev"

# Cron trigger: purge audit logs older than 90 days, daily at 02:00 UTC
[triggers]
crons = ["0 2 * * *"]

[env.preview]
[[env.preview.d1_databases]]
binding = "DB"
database_name = "habitflow-db-preview"
database_id = "9037d6ee-8371-4427-988b-fc04da83618a"

[env.preview.vars]
ENVIRONMENT = "preview"
ALLOWED_ORIGIN = "https://habitflow.pages.dev"
